workflows:
  ios-build:
    name: iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 30
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true
        - pattern: main
          include: true
    scripts:
      - name: Setup
        script: |
          flutter clean
          flutter pub get
          cd ios && pod install --repo-update && cd ..
      - name: Build and package IPA
        script: |
          set -e
          ROOT="$PWD"
          flutter build ios --release --no-codesign
          APP=$(find build -name "Runner.app" -type d | head -1)
          echo "App: $APP"
          echo "Ad-hoc signing..."
          codesign --sign - --force --preserve-metadata=entitlements "$APP"
          mkdir -p "$ROOT/build/ios/ipa"
          cd "$(dirname "$APP")"
          mkdir -p Payload
          cp -R -p Runner.app Payload/
          ditto -c -k --keepParent Payload "$ROOT/build/ios/ipa/Runner.ipa"
          echo "Done:"
          ls -la "$ROOT/build/ios/ipa/"
    artifacts:
      - build/ios/ipa/Runner.ipa

  android-build:
    name: Android Build
    instance_type: linux
    max_build_duration: 20
    environment:
      flutter: stable
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true
        - pattern: main
          include: true
    scripts:
      - flutter pub get
      - flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
